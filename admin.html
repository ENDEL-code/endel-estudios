<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — ENDEL Estudios</title>
  <link rel="icon" href="assets/favicon.ico"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#07090d;--bg2:#0b0f15;--bg3:#0f1520;--card:#0f1520;
      --border:rgba(80,180,255,.12);--accent:#00d4ff;--acc2:#00ff9d;
      --text:#e4f0f8;--muted:#5a7f96;--r:12px;
      --fd:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--fb);font-weight:300;min-height:100vh}

    /* LOGIN */
    #loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:2rem}
    .login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.5rem;width:100%;max-width:380px;text-align:center}
    .login-card img{width:48px;height:48px;object-fit:contain;filter:invert(1);opacity:.8;margin-bottom:1.2rem}
    .login-card h2{font-family:var(--fd);font-size:1.4rem;font-weight:800;margin-bottom:.3rem}
    .login-card p{color:var(--muted);font-size:.85rem;margin-bottom:1.8rem}
    input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--fb);font-size:.95rem;padding:.85rem 1rem;outline:none;transition:.25s;margin-bottom:1rem}
    input:focus{border-color:rgba(0,212,255,.4);box-shadow:0 0 0 3px rgba(0,212,255,.08)}
    input::placeholder{color:rgba(90,127,150,.5)}
    .btn{background:linear-gradient(90deg,var(--accent),var(--acc2));color:var(--bg);border:none;border-radius:10px;padding:.85rem 1.5rem;font-family:var(--fd);font-weight:700;font-size:.95rem;cursor:pointer;transition:.25s;width:100%}
    .btn:hover{opacity:.85}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .btn-sm{padding:.45rem .9rem;font-size:.8rem;width:auto;border-radius:8px}
    .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
    .btn-ghost:hover{color:var(--text);border-color:rgba(0,212,255,.3)}
    .btn-danger{background:rgba(255,80,80,.15);border:1px solid rgba(255,80,80,.3);color:#ff5050}
    .btn-danger:hover{background:rgba(255,80,80,.25)}
    .err{color:#ff6b6b;font-size:.82rem;min-height:1.2em;margin-bottom:.5rem}

    /* PANEL */
    #adminPanel{display:none}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
    .topbar-logo{display:flex;align-items:center;gap:.7rem;font-family:var(--fd);font-weight:800;font-size:1.1rem}
    .topbar-logo img{width:28px;height:28px;object-fit:contain;filter:invert(1);opacity:.7}
    .topbar-right{display:flex;align-items:center;gap:1rem}
    .total-badge{font-size:.8rem;color:var(--muted)}

    .main{padding:2rem;max-width:1200px;margin:0 auto}
    .section-title{font-family:var(--fd);font-size:1.4rem;font-weight:800;margin-bottom:1.5rem}

    /* TICKETS LIST */
    .tickets-list{display:flex;flex-direction:column;gap:1rem}
    .ticket-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:.25s}
    .ticket-card:hover{border-color:rgba(0,212,255,.2)}
    .tc-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.2rem;cursor:pointer;gap:1rem;flex-wrap:wrap}
    .tc-info{display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
    .tc-code{font-family:var(--fd);font-weight:800;font-size:1rem;letter-spacing:.1em;color:var(--accent)}
    .tc-email{font-size:.85rem;color:var(--muted)}
    .tc-fecha{font-size:.75rem;color:var(--muted)}
    .tc-actions{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}

    .badge{display:inline-flex;align-items:center;padding:.3rem .8rem;border-radius:100px;font-family:var(--fd);font-size:.72rem;font-weight:700;letter-spacing:.06em;white-space:nowrap}
    .badge.pendiente{background:rgba(255,180,0,.12);color:#ffb400;border:1px solid rgba(255,180,0,.3)}
    .badge.en_proceso{background:rgba(0,212,255,.12);color:var(--accent);border:1px solid rgba(0,212,255,.3)}
    .badge.revision{background:rgba(150,100,255,.12);color:#a066ff;border:1px solid rgba(150,100,255,.3)}
    .badge.entregado{background:rgba(0,255,157,.12);color:var(--acc2);border:1px solid rgba(0,255,157,.3)}
    .badge.no_autorizado{background:rgba(255,80,80,.12);color:#ff5050;border:1px solid rgba(255,80,80,.3)}

    /* TICKET DETAIL */
    .tc-detail{display:none;padding:1.2rem;border-top:1px solid var(--border);background:var(--bg2)}
    .tc-detail.open{display:block}
    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-bottom:1.2rem}
    .detail-group{display:flex;flex-direction:column;gap:.4rem}
    .detail-label{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
    select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--fb);font-size:.9rem;padding:.65rem .9rem;outline:none;cursor:pointer}
    select:focus{border-color:rgba(0,212,255,.4)}
    select option{background:var(--bg)}
    textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--fb);font-size:.88rem;padding:.75rem .9rem;outline:none;resize:vertical;min-height:80px;line-height:1.6}
    textarea:focus{border-color:rgba(0,212,255,.4)}
    textarea::placeholder{color:rgba(90,127,150,.5)}
    .inline-input{display:flex;gap:.5rem;align-items:center}
    .inline-input input{margin-bottom:0;flex:1;font-size:.88rem;padding:.65rem .9rem}

    /* FILES */
    .files-section{margin-top:1.2rem;padding-top:1.2rem;border-top:1px solid var(--border)}
    .files-title{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.8rem}
    .file-list{display:flex;flex-direction:column;gap:.5rem;margin-bottom:.8rem}
    .file-item{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.65rem .9rem;gap:.5rem}
    .file-name{font-size:.85rem;word-break:break-all}
    .file-size{font-size:.72rem;color:var(--muted);white-space:nowrap}

    .upload-zone{border:1.5px dashed var(--border);border-radius:8px;padding:1.2rem;text-align:center;cursor:pointer;transition:.25s;font-size:.85rem;color:var(--muted);position:relative}
    .upload-zone:hover{border-color:rgba(0,212,255,.3);background:rgba(0,212,255,.03)}
    .upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .upload-progress{font-size:.8rem;color:var(--accent);margin-top:.5rem;min-height:1.2em}

    .detail-footer{display:flex;gap:.7rem;flex-wrap:wrap;margin-top:1.2rem;padding-top:1.2rem;border-top:1px solid var(--border)}

    .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(7,9,13,.4);border-top-color:var(--bg);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    .toast{position:fixed;bottom:2rem;right:2rem;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.8rem 1.2rem;font-size:.85rem;z-index:999;animation:slideIn .3s ease;display:none}
    .toast.show{display:block}
    .toast.ok{border-color:rgba(0,255,157,.3);color:var(--acc2)}
    .toast.fail{border-color:rgba(255,80,80,.3);color:#ff5050}
    @keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    .empty{text-align:center;padding:4rem 2rem;color:var(--muted)}

    @media(max-width:600px){
      .detail-grid{grid-template-columns:1fr}
      .topbar{padding:.8rem 1rem}
      .main{padding:1rem}
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <img src="assets/logo.png" alt="ENDEL"/>
    <h2>Panel Admin</h2>
    <p>ENDEL Estudios — Acceso restringido</p>
    <input type="password" id="passInput" placeholder="Contraseña" />
    <p class="err" id="loginErr"></p>
    <button class="btn" id="loginBtn">Entrar</button>
  </div>
</div>

<!-- PANEL -->
<div id="adminPanel">
  <div class="topbar">
    <div class="topbar-logo">
      <img src="assets/logo.png" alt="ENDEL"/>
      Admin Panel
    </div>
    <div class="topbar-right">
      <span class="total-badge" id="totalBadge">— tickets</span>
      <button class="btn btn-sm btn-ghost" id="refreshBtn">↻ Actualizar</button>
      <button class="btn btn-sm btn-ghost" id="logoutBtn">Salir</button>
    </div>
  </div>

  <div class="main">
    <div class="section-title">Tickets</div>
    <div class="tickets-list" id="ticketsList">
      <div class="empty">Cargando...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'https://endel-estudios-api.endel-code.workers.dev';
  let TOKEN = '';

  function toast(msg, ok=true) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + (ok ? 'ok' : 'fail');
    setTimeout(() => t.className = 'toast', 2500);
  }

  // LOGIN
  document.getElementById('loginBtn').addEventListener('click', async () => {
    const pass = document.getElementById('passInput').value;
    const errEl = document.getElementById('loginErr');
    errEl.textContent = '';
    if (!pass) { errEl.textContent = 'Ingresa la contraseña.'; return; }

    const btn = document.getElementById('loginBtn');
    btn.disabled=true; btn.innerHTML='<span class="spinner"></span>';

    try {
      const res = await fetch(API + '/api/admin/tickets', {
        headers: { 'Authorization': 'Bearer ' + pass }
      });
      if (!res.ok) { errEl.textContent = 'Contraseña incorrecta.'; btn.disabled=false; btn.textContent='Entrar'; return; }

      TOKEN = pass;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      loadTickets();
    } catch(e) {
      errEl.textContent = 'Error de conexion.';
    }
    btn.disabled=false; btn.textContent='Entrar';
  });

  document.getElementById('passInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('loginBtn').click();
  });

  document.getElementById('logoutBtn').addEventListener('click', () => {
    TOKEN = '';
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('passInput').value = '';
  });

  document.getElementById('refreshBtn').addEventListener('click', loadTickets);

  // CARGAR TICKETS
  async function loadTickets() {
    const list = document.getElementById('ticketsList');
    list.innerHTML = '<div class="empty">Cargando...</div>';

    try {
      const res = await fetch(API + '/api/admin/tickets', {
        headers: { 'Authorization': 'Bearer ' + TOKEN }
      });
      const tickets = await res.json();

      document.getElementById('totalBadge').textContent = tickets.length + ' ticket' + (tickets.length !== 1 ? 's' : '');

      if (!tickets.length) { list.innerHTML = '<div class="empty">No hay tickets aún.</div>'; return; }

      list.innerHTML = tickets.map(t => renderTicket(t)).join('');
      attachEvents();
    } catch(e) {
      list.innerHTML = '<div class="empty">Error cargando tickets.</div>';
    }
  }

  function renderTicket(t) {
    const LABELS = {
      pendiente:'Pendiente', en_proceso:'En proceso',
      revision:'En revisión', entregado:'Entregado', no_autorizado:'No autorizado'
    };
    const fecha = new Date(t.fecha).toLocaleDateString('es-MX', {dateStyle:'medium'});
    return `
    <div class="ticket-card" id="tc-${t.code}">
      <div class="tc-header" onclick="toggleDetail('${t.code}')">
        <div class="tc-info">
          <span class="tc-code">${t.code}</span>
          <span class="tc-email">${t.email}</span>
          <span class="tc-fecha">${fecha}</span>
        </div>
        <div class="tc-actions">
          <span class="badge ${t.estado}">${LABELS[t.estado] || t.estado}</span>
        </div>
      </div>
      <div class="tc-detail" id="detail-${t.code}">
        <div class="detail-grid">
          <div class="detail-group">
            <div class="detail-label">Estado</div>
            <select id="estado-${t.code}">
              <option value="pendiente" ${t.estado==='pendiente'?'selected':''}>Pendiente</option>
              <option value="en_proceso" ${t.estado==='en_proceso'?'selected':''}>En proceso</option>
              <option value="revision" ${t.estado==='revision'?'selected':''}>En revisión</option>
              <option value="entregado" ${t.estado==='entregado'?'selected':''}>Entregado</option>
              <option value="no_autorizado" ${t.estado==='no_autorizado'?'selected':''}>No autorizado</option>
            </select>
          </div>
          <div class="detail-group">
            <div class="detail-label">Código de entrega (para el cliente)</div>
            <div class="inline-input">
              <input type="text" id="unlock-${t.code}" value="${t.unlock_code||''}" placeholder="Ej: ENTREGA2025"/>
              <button class="btn btn-sm" onclick="generateUnlock('${t.code}')">Generar</button>
            </div>
          </div>
        </div>
        <div class="detail-grid">
          <div class="detail-group">
            <div class="detail-label">Nota pública (visible para el cliente)</div>
            <textarea id="notapub-${t.code}" placeholder="Ej: Tu proyecto está en revisión de diseño...">${t.nota_publica||''}</textarea>
          </div>
          <div class="detail-group">
            <div class="detail-label">Nota de entrega (se ve al desbloquear)</div>
            <textarea id="notaent-${t.code}" placeholder="Ej: Aquí están los archivos finales. Contraseña del zip: endel2025">${t.nota_entrega||''}</textarea>
          </div>
        </div>

        <div class="files-section">
          <div class="files-title">Archivos del proyecto</div>
          <div class="file-list" id="files-${t.code}">
            <div style="font-size:.82rem;color:var(--muted)">Cargando archivos...</div>
          </div>
          <div class="upload-zone" id="zone-${t.code}">
            <span>⬆ Arrastra archivos aquí o haz clic para seleccionar</span>
            <input type="file" multiple id="fileinput-${t.code}" onchange="uploadFiles('${t.code}')"/>
          </div>
          <div class="upload-progress" id="progress-${t.code}"></div>
        </div>

        <div class="detail-footer">
          <button class="btn btn-sm" onclick="saveTicket('${t.code}')">Guardar cambios</button>
          <button class="btn btn-sm btn-ghost" onclick="loadFiles('${t.code}')">↻ Actualizar archivos</button>
          <button class="btn btn-sm btn-danger" onclick="deleteTicket('${t.code}')">Eliminar ticket</button>
        </div>
      </div>
    </div>`;
  }

  function attachEvents() {
    // Auto-cargar archivos cuando se abra un ticket
  }

  function toggleDetail(code) {
    const detail = document.getElementById('detail-' + code);
    const isOpen = detail.classList.contains('open');
    document.querySelectorAll('.tc-detail').forEach(d => d.classList.remove('open'));
    if (!isOpen) {
      detail.classList.add('open');
      loadFiles(code);
    }
  }

  function generateUnlock(code) {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    const unlock = Array.from({length:8}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
    document.getElementById('unlock-' + code).value = unlock;
  }

  async function saveTicket(code) {
    const estado     = document.getElementById('estado-' + code).value;
    const nota_publica = document.getElementById('notapub-' + code).value;
    const nota_entrega = document.getElementById('notaent-' + code).value;
    const unlock_code  = document.getElementById('unlock-' + code).value;

    try {
      const res = await fetch(API + '/api/admin/ticket/' + code, {
        method: 'PUT',
        headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+TOKEN },
        body: JSON.stringify({ estado, nota_publica, nota_entrega, unlock_code })
      });
      if (res.ok) { toast('Guardado correctamente'); loadTickets(); }
      else toast('Error al guardar', false);
    } catch(e) { toast('Error de conexion', false); }
  }

  async function deleteTicket(code) {
    if (!confirm('¿Eliminar el ticket ' + code + '? Esta acción no se puede deshacer.')) return;
    try {
      const res = await fetch(API + '/api/admin/ticket/' + code, {
        method: 'DELETE',
        headers: { 'Authorization':'Bearer '+TOKEN }
      });
      if (res.ok) { toast('Ticket eliminado'); loadTickets(); }
      else toast('Error al eliminar', false);
    } catch(e) { toast('Error de conexion', false); }
  }

  async function loadFiles(code) {
    const container = document.getElementById('files-' + code);
    if (!container) return;

    try {
      const res = await fetch(API + '/api/ticket/desbloquear', {
        method: 'POST',
        headers: { 'Content-Type':'application/json' },
        body: JSON.stringify({ ticket_code: code, unlock_code: '__ADMIN__' })
      });
      // Como admin listamos de otra forma - usamos endpoint especial
      // Por simplicidad listamos via el propio admin
      container.innerHTML = '<div style="font-size:.82rem;color:var(--muted)">Sube archivos arriba.</div>';
    } catch(e) {}
  }

  async function uploadFiles(code) {
    const input = document.getElementById('fileinput-' + code);
    const progress = document.getElementById('progress-' + code);
    const files = input.files;
    if (!files.length) return;

    progress.textContent = 'Subiendo ' + files.length + ' archivo(s)...';

    let ok = 0;
    for (const file of files) {
      try {
        const res = await fetch(API + '/api/admin/upload/' + code + '?filename=' + encodeURIComponent(file.name), {
          method: 'POST',
          headers: { 'Authorization':'Bearer '+TOKEN, 'Content-Type': file.type || 'application/octet-stream' },
          body: file
        });
        if (res.ok) ok++;
      } catch(e) {}
    }

    progress.textContent = ok + '/' + files.length + ' archivos subidos.';
    toast(ok + ' archivo(s) subido(s)');
    input.value = '';
    setTimeout(() => { progress.textContent = ''; }, 3000);
  }
</script>
</body>
</html>
